<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Channel RSS Feeder</title>
  <style>
    :root { --bg:#0f172a; --card:#1f2937; --text:#e5e7eb; --muted:#94a3b8; --border:#334155; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { width:min(98vw,2200px); margin:0 auto; padding:12px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; }
    .thumb-link { display:block; }
    .thumb { width:100%; aspect-ratio:16/9; object-fit:cover; background:#0b1220; display:block; }
    .content { padding:10px; }
    .channel { font-size:.8rem; margin:0 0 6px; }
    .channel a { color:#fca5a5; text-decoration:none; }
    .channel a:hover { text-decoration:underline; }
    .title { font-size:.92rem; line-height:1.25; margin:0 0 6px; }
    .title a { color:inherit; text-decoration:none; }
    .title a:hover { text-decoration:underline; }
    .meta { font-size:.8rem; color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid" id="feed"></div>
  </div>

  <script>
    const channels = [
        { name: "TVM", id: "UChlf9r1rzhJ_SVM_WCKFL1g" },
        { name: "TVMnews", id: "UCQqDItOUGaNkjMz7Qx-uiSg" },
        { name: "NET", id: "UCDk--GDyW4GCl20yIYhQHPw" },
        { name: "NETnews", id: "UCWqWkFMzjksaoWGhz6oWctQ" },
        { name: "ONE", id: "UC6ItZEuaj9I15C-nviRYWZw" },
        { name: "ONEnews", id: "UCb_pqqIa6zZigtiCdxEh2AA" },
        { name: "Times of Malta", id: "UCSuzswNAnqhch7GxCCj3FOA" },
        { name: "Newsbook Malta", id: "UCnXEc15dYaAdEdCR2dr-lBg" }
    ];

    const els = { feed: document.getElementById("feed") };

    function ytRssUrl(channelId) {
      return `https://www.youtube.com/feeds/videos.xml?channel_id=${encodeURIComponent(channelId)}`;
    }

    function rssToJsonUrl(rssUrl) {
      return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    }

    function channelVideosUrl(channelId) {
      return `https://www.youtube.com/channel/${encodeURIComponent(channelId)}/videos`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d)) return "Unknown date";
      return d.toLocaleString();
    }

    function extractVideoId(link) {
      try {
        const url = new URL(link);
        return url.searchParams.get("v");
      } catch {
        return null;
      }
    }

    function thumbnailFor(item) {
      if (item.thumbnail) return item.thumbnail;
      const id = extractVideoId(item.link);
      return id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : "";
    }

    async function fetchChannelFeed(channel) {
      const url = rssToJsonUrl(ytRssUrl(channel.id));
      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} for ${channel.name}`);
      }

      const data = await res.json();

      if (data.status !== "ok") {
        throw new Error(`Feed error for ${channel.name}: ${data.message || "unknown error"}`);
      }

      return (data.items || []).map(item => ({
        channelName: channel.name,
        channelId: channel.id,
        title: item.title,
        link: item.link,
        pubDate: item.pubDate,
        thumbnail: thumbnailFor(item),
      }));
    }

    function renderItems(items) {
      els.feed.innerHTML = items.map(item => `
        <article class="card">
          <a class="thumb-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">
            ${item.thumbnail ? `<img class="thumb" src="${escapeHtml(item.thumbnail)}" alt="">` : ""}
          </a>
          <div class="content">
            <div class="channel">
              <a href="${escapeHtml(channelVideosUrl(item.channelId))}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.channelName)}</a>
            </div>
            <h2 class="title">
              <a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
            </h2>
            <div class="meta">${escapeHtml(formatDate(item.pubDate))}</div>
          </div>
        </article>
      `).join("");
    }

    async function loadFeeds() {
      const settled = await Promise.allSettled(channels.map(fetchChannelFeed));
      const allItems = [];

      for (const result of settled) {
        if (result.status === "fulfilled") {
          allItems.push(...result.value);
        }
      }

      allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
      renderItems(allItems);
    }

    loadFeeds();
  </script>
</body>
</html>
